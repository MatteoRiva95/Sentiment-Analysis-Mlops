name: MLOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.1"

      - name: Install dependencies
        run: pip install -r requirements.txt
      
      # CI

      - name: Run Unit Tests
        run: python -m pytest tests/  # Create a simple test for your predict function
      
      # CD: Deploy on Hugging Face
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://huggingface.co/spaces/TeoR95/mlops-reputation-monitor-innovators
          git push --force hf main
